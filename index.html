<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulaire Cinématographique — Prompts IA Vidéo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0c10;
    --surface: #13151a;
    --surface2: #1c1f28;
    --border: #2a2d3a;
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;

    --kling: #f97316;
    --kling-bg: rgba(249,115,22,0.1);
    --kling-border: rgba(249,115,22,0.35);

    --canvas: #3b82f6;
    --canvas-bg: rgba(59,130,246,0.1);
    --canvas-border: rgba(59,130,246,0.35);

    --veo: #10b981;
    --veo-bg: rgba(16,185,129,0.1);
    --veo-border: rgba(16,185,129,0.35);

    --runway: #a855f7;
    --runway-bg: rgba(168,85,247,0.1);
    --runway-border: rgba(168,85,247,0.35);

    --all: #e8eaf0;
    --all-bg: rgba(232,234,240,0.06);
    --all-border: rgba(232,234,240,0.2);

    --copy-flash: #fbbf24;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    padding: 3rem 2rem 2rem;
    text-align: center;
    position: relative;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0e1018 0%, var(--bg) 100%);
  }

  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--kling), var(--canvas), var(--veo), var(--runway));
  }

  header h1 {
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 0.5rem;
  }

  header h1 span {
    background: linear-gradient(135deg, #f97316, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  header p {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
    letter-spacing: 0.05em;
  }

  /* LEGEND */
  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.6rem;
    margin: 1.5rem auto 0;
    max-width: 700px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
    padding: 0.3rem 0.7rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }

  .legend-item:hover { border-color: var(--text-muted); }
  .legend-item.active { color: var(--text); }
  .legend-item[data-filter="all"].active { border-color: var(--all-border); background: var(--all-bg); }
  .legend-item[data-filter="kling"].active { border-color: var(--kling-border); background: var(--kling-bg); color: var(--kling); }
  .legend-item[data-filter="canvas"].active { border-color: var(--canvas-border); background: var(--canvas-bg); color: var(--canvas); }
  .legend-item[data-filter="veo"].active { border-color: var(--veo-border); background: var(--veo-bg); color: var(--veo); }
  .legend-item[data-filter="runway"].active { border-color: var(--runway-border); background: var(--runway-bg); color: var(--runway); }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* SEARCH */
  .search-wrap {
    max-width: 600px;
    margin: 1.5rem auto 0;
    padding: 0 1rem;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    padding: 0.7rem 1rem;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--canvas); }
  .search-wrap input::placeholder { color: var(--text-muted); }

  /* MAIN */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* SECTION */
  .section {
    margin-bottom: 2.5rem;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 1rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--border);
  }

  .section-icon {
    font-size: 1.2rem;
    opacity: 0.9;
  }

  .section-title {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .section-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-left: auto;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 0.6rem;
  }

  /* TERM CARD */
  .term {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    cursor: pointer;
    transition: all 0.15s ease;
    overflow: hidden;
  }

  .term::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 8px 0 0 8px;
    transition: width 0.2s;
  }

  .term:hover {
    background: var(--surface2);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .term:hover::before { width: 4px; }

  /* Platform tints */
  .term.kling { border-color: var(--kling-border); }
  .term.kling::before { background: var(--kling); }
  .term.kling:hover { border-color: var(--kling); }

  .term.canvas { border-color: var(--canvas-border); }
  .term.canvas::before { background: var(--canvas); }
  .term.canvas:hover { border-color: var(--canvas); }

  .term.veo { border-color: var(--veo-border); }
  .term.veo::before { background: var(--veo); }
  .term.veo:hover { border-color: var(--veo); }

  .term.runway { border-color: var(--runway-border); }
  .term.runway::before { background: var(--runway); }
  .term.runway:hover { border-color: var(--runway); }

  .term.all { border-color: var(--border); }
  .term.all::before { background: linear-gradient(180deg, var(--kling), var(--canvas), var(--veo), var(--runway)); }

  /* Term content */
  .term-en {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.03em;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
  }

  .term-fr {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 0.15rem;
  }

  .term-desc {
    font-size: 0.68rem;
    color: var(--text-muted);
    margin-top: 0.35rem;
    line-height: 1.45;
    font-family: 'DM Mono', monospace;
    font-style: italic;
  }

  /* Platform badges */
  .badges {
    display: flex;
    gap: 3px;
    flex-shrink: 0;
  }

  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.56rem;
    font-weight: 500;
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }

  .badge.kling { background: var(--kling-bg); color: var(--kling); border: 1px solid var(--kling-border); }
  .badge.canvas { background: var(--canvas-bg); color: var(--canvas); border: 1px solid var(--canvas-border); }
  .badge.veo { background: var(--veo-bg); color: var(--veo); border: 1px solid var(--veo-border); }
  .badge.runway { background: var(--runway-bg); color: var(--runway); border: 1px solid var(--runway-border); }

  /* Copy indicator */
  .copy-icon {
    position: absolute;
    right: 0.75rem;
    bottom: 0.75rem;
    font-size: 0.65rem;
    color: var(--text-muted);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .term:hover .copy-icon { opacity: 0.6; }

  .term.copied {
    border-color: var(--copy-flash) !important;
  }

  .term.copied::after {
    content: '✓ copié';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(251,191,36,0.12);
    color: var(--copy-flash);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    border-radius: 8px;
    letter-spacing: 0.1em;
    pointer-events: none;
  }

  /* Hidden */
  .term.hidden, .section.hidden { display: none; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--copy-flash);
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    padding: 0.6rem 1.2rem;
    border-radius: 40px;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999;
    pointer-events: none;
  }

  #toast.show { transform: translateX(-50%) translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    header { padding: 2rem 1rem 1.5rem; }
  }
</style>
</head>

</header>

<main id="main">

// ─── RENDER ──────────────────────────────────────────────────────────────────
const main = document.getElementById('main');

function buildBadges(platforms) {
  if (platforms.includes('all')) return '';
  return `<div class="badges">${platforms.map(p => `<span class="badge ${p}">${p.toUpperCase()}</span>`).join('')}</div>`;
}

function getPlatformClass(platforms) {
  if (platforms.includes('all') || platforms.length > 2) return 'all';
  return platforms[0];
}

function buildSection(section) {
  const sectionEl = document.createElement('div');
  sectionEl.className = 'section';
  sectionEl.dataset.section = section.title;

  const header = `
    <div class="section-header">
      <span class="section-icon">${section.icon}</span>
      <div>
        <div class="section-title">${section.title}</div>
      </div>
      <span class="section-count">${section.terms.length} termes</span>
    </div>`;

  const grid = document.createElement('div');
  grid.className = 'grid';

  section.terms.forEach(term => {
    const cls = getPlatformClass(term.platforms);
    const card = document.createElement('div');
    card.className = `term ${cls}`;
    card.dataset.en = term.en.toLowerCase();
    card.dataset.fr = term.fr.toLowerCase();
    card.dataset.platforms = term.platforms.join(',');
    card.innerHTML = `
      <div class="term-en">
        <span>${term.en}</span>
        ${buildBadges(term.platforms)}
      </div>
      <div class="term-fr">${term.fr}</div>
      ${term.desc ? `<div class="term-desc">${term.desc}</div>` : ''}
      <span class="copy-icon">⎘</span>
    `;
    card.addEventListener('click', () => copyTerm(card, term.en));
    grid.appendChild(card);
  });

  sectionEl.innerHTML = header;
  sectionEl.appendChild(grid);
  return sectionEl;
}

SECTIONS.forEach(s => main.appendChild(buildSection(s)));

// ─── COPY ────────────────────────────────────────────────────────────────────
const toast = document.getElementById('toast');
let toastTimeout;

function copyTerm(card, text) {
  navigator.clipboard.writeText(text).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });
  card.classList.add('copied');
  setTimeout(() => card.classList.remove('copied'), 1000);

  toast.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove('show'), 1800);
}

// ─── FILTER ──────────────────────────────────────────────────────────────────
let activeFilter = 'all';

document.querySelectorAll('.legend-item').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.legend-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  });
});

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();

  document.querySelectorAll('.term').forEach(card => {
    const matchesFilter = activeFilter === 'all' ||
      card.dataset.platforms.includes(activeFilter);
    const matchesSearch = !q ||
      card.dataset.en.includes(q) ||
      card.dataset.fr.includes(q) ||
      card.querySelector('.term-desc')?.textContent.toLowerCase().includes(q);

    card.classList.toggle('hidden', !(matchesFilter && matchesSearch));
  });

  // Hide empty sections
  document.querySelectorAll('.section').forEach(sec => {
    const visible = [...sec.querySelectorAll('.term')].some(c => !c.classList.contains('hidden'));
    sec.classList.toggle('hidden', !visible);
  });
}

document.getElementById('search').addEventListener('input', applyFilters);
